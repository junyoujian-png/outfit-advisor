workflows:
  default-workflow:
    name: Default Workflow
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing
    scripts:
      - name: Set up keychain and add certificate
        script: |
          keychain initialize
          printf '%s' "$CM_CERTIFICATE" | base64 -D -o /tmp/certificate.p12
          python3 << 'EOF'
          from cryptography.hazmat.primitives.serialization import pkcs12, Encoding, PrivateFormat, NoEncryption
          with open('/tmp/certificate.p12', 'rb') as f:
              private_key, certificate, chain = pkcs12.load_key_and_certificates(f.read(), b'')
          with open('/tmp/cert.pem', 'wb') as f:
              f.write(certificate.public_bytes(Encoding.PEM))
          with open('/tmp/key.pem', 'wb') as f:
              f.write(private_key.private_bytes(Encoding.PEM, PrivateFormat.TraditionalOpenSSL, NoEncryption()))
          print("Extracted cert and key successfully")
          EOF
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db | head -1)
          security import /tmp/cert.pem -k "$KEYCHAIN" -A
          security import /tmp/key.pem -k "$KEYCHAIN" -A
          security find-identity -v -p codesigning
      - name: Download provisioning profile
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          PROFILE_ID=$(app-store-connect profiles list \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --json | python3 -c "import sys,json; profiles=json.load(sys.stdin); print(profiles[0]['id'])")
          app-store-connect profiles get $PROFILE_ID \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --save
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd outfit_advisor
          flutter pub get
      - name: Build iOS
        script: |
          cd outfit_advisor
          flutter build ipa --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Build Android
        script: |
          cd outfit_advisor
          flutter build apk --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=ENABLE_ADS=false
    artifacts:
      - outfit_advisor/build/ios/ipa/*.ipa
      - outfit_advisor/build/app/outputs/flutter-apk/*.apk
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
