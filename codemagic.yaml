workflows:
  default-workflow:
    name: Default Workflow
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Add certificate to keychain
        script: |
          printf '%s' "$CM_CERTIFICATE" | base64 -D -o /tmp/certificate.p12
          security unlock-keychain -p "" ~/Library/Keychains/login.keychain-db
          security import /tmp/certificate.p12 -k ~/Library/Keychains/login.keychain-db -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "" ~/Library/Keychains/login.keychain-db
      - name: Download provisioning profile
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          app-store-connect profiles list \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8
      - name: Fetch signing files
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          app-store-connect fetch-signing-files com.junyoujian.zodiacadvisor \
            --type IOS_APP_STORE \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --create
      - name: Use profiles
        script: xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd outfit_advisor
          flutter pub get
      - name: Build iOS
        script: |
          cd outfit_advisor
          flutter build ipa --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Build Android
        script: |
          cd outfit_advisor
          flutter build apk --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=ENABLE_ADS=false
    artifacts:
      - outfit_advisor/build/ios/ipa/*.ipa
      - outfit_advisor/build/app/outputs/flutter-apk/*.apk
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
