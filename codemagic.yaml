workflows:
  default-workflow:
    name: Default Workflow
    environment:
      flutter: stable
      xcode: latest
      groups:
        - ios_signing
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Add certificate to keychain
        script: |
          printf '%s' "$CM_CERTIFICATE" | base64 -D -o /tmp/certificate.p12
          KEYCHAIN=$(ls ~/Library/codemagic-cli-tools/keychains/*.keychain-db | head -1)
          echo "Using keychain: $KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "codemagic-cli-tools" "$KEYCHAIN"
          security import /tmp/certificate.p12 -k "$KEYCHAIN" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "codemagic-cli-tools" "$KEYCHAIN"
      - name: Download provisioning profile
        script: |
          printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/api_key.p8
          PROFILE_ID=$(app-store-connect profiles list \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --json | python3 -c "import sys,json; profiles=json.load(sys.stdin); print(profiles[0]['id'])")
          app-store-connect profiles get $PROFILE_ID \
            --issuer-id $APP_STORE_CONNECT_ISSUER_ID \
            --key-id $APP_STORE_CONNECT_KEY_IDENTIFIER \
            --private-key @file:/tmp/api_key.p8 \
            --save
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd outfit_advisor
          flutter pub get
      - name: Build iOS
        script: |
          cd outfit_advisor
          flutter build ipa --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY
      - name: Build Android
        script: |
          cd outfit_advisor
          flutter build apk --release \
            --dart-define=SUPABASE_ANON_KEY=$SUPABASE_ANON_KEY \
            --dart-define=ENABLE_ADS=false
    artifacts:
      - outfit_advisor/build/ios/ipa/*.ipa
      - outfit_advisor/build/app/outputs/flutter-apk/*.apk
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
